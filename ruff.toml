# Ruff configuration for Clinical-AI-Demos
# See https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py310"

[lint]
select = ["E", "F", "W"]
# F841: unused variables are common in example/reference code that demonstrates patterns
# E741: single-letter variables (l, O) appear in physics/math formulas
# E501: long lines in regulatory strings and descriptions are more readable unsplit
ignore = ["F841", "E741", "E501"]

[lint.per-file-ignores]
# Demo project scripts use conditional imports and reference patterns
# E401: multi-import on one line (allowed in notebook cells)
# E402: module-level import after sys.path mutation (conftest.py pattern)
"demo-projects/**/*.py" = ["F401", "F402", "F821", "E401", "E402"]
"demo-projects/**/*.ipynb" = ["F401", "F402", "F821", "E401", "E402"]
# National repository scripts use conditional imports
"national-repositories/**/*.py" = ["F401", "F402"]

[format]
# The v0.4.0 codegen tree at demo-projects/07-humanoid/paper/codegen/ was
# authored across multiple commits; some files were pushed before final
# format pass. The codegen pyproject.toml re-enables format for codegen
# internal development.
exclude = ["demo-projects/07-humanoid/paper/codegen/**"]
